[package]
name = "test_suite_rom"
version = "0.1.0"
edition = "2024"

[features]
collect = []
compare = []
default = ["collect"]

[dependencies]
linked_list_allocator = "0.10"
n64_specs = { path = "../specs" }
postcard = { version = "1.1.3", default-features = false, features = ["alloc"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }
test_suite_common = { path = "../test-suite-common" }
